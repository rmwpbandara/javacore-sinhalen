# Static SPA serving for the Angular app behind the shared edge proxy.
# The edge-nginx (/opt/edge) terminates the hostname demo2.eseeds.lk and
# proxies to demo2-web:80 on the demo2_internal network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # compress text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/xml font/woff2;

    # long-cache fingerprinted build assets
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # never cache the app shell (so new deploys are picked up)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
