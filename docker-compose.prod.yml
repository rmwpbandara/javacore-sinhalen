# ──────────────────────────────────────────────────────────────────────────────
# demo2 — JavaCore Sinhalen (Angular static learning site), production stack.
#
# Isolated stack: its own `internal` network (becomes `demo2_internal`). No host
# ports are published — the shared edge proxy (/opt/edge, container "edge-nginx")
# attaches to this network and routes by hostname:
#   demo2.eseeds.lk  -> demo2-web:80
# This is a static SPA, so there is no backend service.
# ──────────────────────────────────────────────────────────────────────────────
name: demo2

services:
  demo2-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: demo2-web
    container_name: demo2-web
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  internal:
    driver: bridge
